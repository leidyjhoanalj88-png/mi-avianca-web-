<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bancolombia</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bancolombia">
    
    <link rel="apple-touch-icon" href="icon-bancolombia.png">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body {
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .logo {
            width: 180px;
            margin-bottom: 40px;
        }

        .instruction-card {
            background: #f4f4f4;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 320px;
        }

        h2 { font-size: 1.2rem; margin-bottom: 20px; color: #333; }

        .step {
            display: flex;
            align-items: center;
            text-align: left;
            margin-bottom: 15px;
            font-size: 0.95rem;
            color: #555;
        }

        .step-num {
            background: #fdda24; /* Amarillo Bancolombia */
            color: #000;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .icon-share { width: 20px; vertical-align: middle; margin: 0 5px; }
        
        .footer-brand {
            position: absolute;
            bottom: 30px;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>

    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/00/Bancolombia_logo.svg/2560px-Bancolombia_logo.svg.png" alt="Bancolombia" class="logo">

    <div class="instruction-card">
        <h2>💎 ¿Cómo instalar la APP?</h2>
        
        <div class="step">
            <div class="step-num">1</div>
            <p>Abre este link en el navegador <strong>Safari</strong>.</p>
        </div>

        <div class="step">
            <div class="step-num">2</div>
            <p>Toca el icono de <strong>Compartir</strong> <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d5/IOS_Share_Icon.svg/1200px-IOS_Share_Icon.svg.png" class="icon-share"> en la barra inferior.</p>
        </div>

        <div class="step">
            <div class="step-num">3</div>
            <p>Selecciona la opción <strong>"Agregar a inicio"</strong>.</p>
        </div>

        <div class="step">
            <div class="step-num">4</div>
            <p>Confirma y ¡listo! Ya tienes Bancolombia en tu pantalla principal.</p>
        </div>
    </div>

    <div class="footer-brand">
        Bancolombia S.A. 2026
    </div>

</body>
</html>
