<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bancolombia</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bancolombia">
    
    <link rel="apple-touch-icon" href="https://i.ibb.co/Xf8zXzR/App.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body {
            background-color: #000; /* Fondo negro como el icono */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* DISEÑO DEL ICONO CENTRAL */
        .main-icon {
            width: 150px;
            height: 150px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* CUADRO DE DESCARGA (POPUP) */
        .download-modal {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 350px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 9999;
        }

        @keyframes slideUp {
            from { bottom: -200px; opacity: 0; }
            to { bottom: 20px; opacity: 1; }
        }

        .modal-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .modal-text {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        .modal-text h3 { font-size: 18px; margin-bottom: 5px; }
        .modal-text p { font-size: 14px; color: #666; }

        /* BOTONES DE PASOS */
        .step-instruction {
            width: 100%;
            background: #f0f0f0;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .icon-small { width: 20px; height: 20px; }

        .btn-ready {
            margin-top: 10px;
            color: #007AFF;
            font-weight: 600;
            text-decoration: none;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <img src="https://i.ibb.co/Xf8zXzR/App.png" class="main-icon" alt="Bancolombia">

    <div class="download-modal">
        <img src="https://i.ibb.co/Xf8zXzR/App.png" class="modal-icon">
        
        <div class="modal-text">
            <h3>Instalar Bancolombia</h3>
            <p>Sigue estos pasos para añadir la app a tu inicio</p>
        </div>

        <div class="step-instruction">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d5/IOS_Share_Icon.svg/1200px-IOS_Share_Icon.svg.png" class="icon-small">
            <span>1. Toca el botón <b>Compartir</b></span>
        </div>

        <div class="step-instruction">
            <span style="font-size: 20px;">+</span>
            <span>2. Dale a <b>"Agregar al inicio"</b></span>
        </div>

        <a href="#" class="btn-ready" onclick="document.querySelector('.download-modal').style.display='none'">Entendido</a>
    </div>

</body>
</html>
